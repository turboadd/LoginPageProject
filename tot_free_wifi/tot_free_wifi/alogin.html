<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Internet hotspot - Redirect</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        function startClock() {
            $(if popup == 'true')
                open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
            $(endif)
            location.href = unescape('$(link-redirect-esc)');
        }

    </script>
</head>

<body class="lite" onLoad="startClock()">
    <div class="ie-fixMinHeight">
        <div class="fullscreen" style="background-image:url('img/background.jpg');" data-img-width="2000"
            data-img-height="911" data-diff="100">
            <div class="overlay">
                <div class="main">
                    <div class="wrap">
                        <h1>You are logged in</h1>
                        <p class="info">If nothing happens, click <a href="$(link-redirect)">here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
