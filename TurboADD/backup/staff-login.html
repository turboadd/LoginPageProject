<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เจ้าหน้าที่ — Hotspot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: #333; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-primary:hover { background: #333; }

    .btn-back {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
    }

    .btn-back:hover { color: #333; }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #f5c6c6;
      color: #c00;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

  $(if chap-id)
  <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
    <input type="hidden" name="username" />
    <input type="hidden" name="password" />
    <input type="hidden" name="dst" value="notice.html" />
    <input type="hidden" name="popup" value="true" />
  </form>
  <script src="/md5.js"></script>
  <script>
    function doLogin() {
      document.sendin.username.value = document.login.username.value;
      document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
      document.sendin.submit();
      return false;
    }
  </script>
  $(endif)

  <div class="card">
    <div class="card-title">เจ้าหน้าที่</div>
    <div class="card-sub">กรอกข้อมูลเพื่อเข้าสู่ระบบ</div>

    $(if error)
    <div class="error-msg">$(error)</div>
    $(endif)

    <form name="login" action="$(link-login-only)" method="post"
      $(if chap-id) onsubmit="return doLogin()" $(endif)>
      <input type="hidden" name="dst" value="notice.html" />
      <input type="hidden" name="popup" value="true" />

      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <input type="text" name="username" value="$(username)" placeholder="Username" autocomplete="username" required />
      </div>

      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn-primary">เข้าสู่ระบบ</button>
    </form>

    <button class="btn-back" onclick="history.back()">← กลับ</button>
  </div>

</body>
</html>
