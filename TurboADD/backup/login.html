<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลงทะเบียน — Hotspot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: #333; }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #f5c6c6;
      color: #c00;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-primary:hover { background: #333; }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }

    .btn-staff {
      width: 100%;
      padding: 10px;
      background: none;
      color: #666;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-staff:hover { background: #f5f5f5; color: #333; }
  </style>
</head>
<body>

  <!-- hidden login form สำหรับให้ backend เรียก auto login -->
  <form name="login" action="$(link-login-only)" method="post" style="display:none">
    <input type="hidden" name="dst" value="ad.html" />
    <input type="hidden" name="popup" value="true" />
    <input type="hidden" name="username" />
    <input type="hidden" name="password" /> 

    
  </form>

  <div class="card">
    <div class="card-title">ยินดีต้อนรับ</div>
    <div class="card-sub">กรอกข้อมูลเพื่อใช้งานอินเทอร์เน็ต</div>

    $(if error)
    <div class="error-msg">$(error)</div>
    $(endif)

    <form name="regform" id="regform"
      action="http://192.168.100.245/addturbo_login/register.php"
      method="post"
      onsubmit="return validateForm()">

      <!-- MikroTik variables ส่งให้ backend เพื่อทำ auto login -->
      <input type="hidden" name="mac"             value="$(mac)" />
      <input type="hidden" name="ip"              value="$(ip)" />
      <input type="hidden" name="chap-id"         value="$(chap-id)" />
      <input type="hidden" name="chap-challenge"  value="$(chap-challenge)" />
      <input type="hidden" name="link-login-only" value="$(link-login-only)" />
      <input type="hidden" name="link-orig"       value="$(link-orig)" />

      <!-- Change Username to same api user -->
      <input name="UsernameInSite" type="hidden" value="s0l#api" />
      <input name="PasswordInSite" type="hidden" value="api#s0l" />

      <div class="field">
        <label>เลขประจำตัวประชาชน</label>
        <input type="text" name="idcard" id="idcard"
          placeholder="x-xxxx-xxxxx-xx-x"
          maxlength="13"
          inputmode="numeric"
          required />
      </div>

      <div class="field">
        <label>เบอร์โทรศัพท์</label>
        <input type="text" name="phone" id="phone"
          placeholder="0xx-xxx-xxxx"
          maxlength="10"
          inputmode="numeric"
          required />
      </div>

      <button type="submit" class="btn-primary">ลงทะเบียน</button>
    </form>

    <hr class="divider">

    <button class="btn-staff" onclick="location.href='staff-login.html'">
      เจ้าหน้าที่ →
    </button>
  </div>

  <script>
    function validateForm() {
      var idcard = document.getElementById('idcard').value;
      var phone  = document.getElementById('phone').value;

      // ตรวจสอบว่ากรอกครบ
      if (idcard === '' || phone === '') {
        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
        return false;
      }

      // ตรวจสอบเลขบัตรประชาชน 13 หลัก
      if (idcard.length !== 13 || isNaN(idcard)) {
        alert('เลขบัตรประชาชนไม่ถูกต้อง');
        return false;
      }

      // checksum เลขบัตรประชาชน
      var sum = 0;
      for (var i = 0; i < 12; i++) {
        sum += parseInt(idcard[i]) * (13 - i);
      }
      var checkDigit = (11 - (sum % 11)) % 10;
      if (checkDigit !== parseInt(idcard[12])) {
        alert('เลขบัตรประชาชนไม่ถูกต้อง');
        return false;
      }

      // ตรวจสอบเบอร์โทร 10 หลัก ขึ้นต้นด้วย 06, 08, 09
      if (phone.length !== 10 || phone[0] !== '0' || !['6','8','9'].includes(phone[1])) {
        alert('เบอร์โทรศัพท์ไม่ถูกต้อง');
        return false;
      }

      return true;
    }
  </script>

</body>
</html>
